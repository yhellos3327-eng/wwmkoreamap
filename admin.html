<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 인증 - 연운 지도</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #daac71;
            --primary-dark: #b88d55;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(30, 30, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
            --text-muted: #888;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        .bg-glow {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(218, 172, 113, 0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
            animation: move 20s infinite alternate;
        }
        .bg-glow:nth-child(2) {
            bottom: -10%;
            right: -10%;
            background: radial-gradient(circle, rgba(85, 133, 255, 0.05) 0%, rgba(0,0,0,0) 70%);
            animation-duration: 25s;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(10%, 10%) scale(1.2); }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 48px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
        }

        .brand-logo {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .brand-logo svg {
            width: 36px;
            height: 36px;
            fill: var(--primary);
        }

        .login-title {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 4px;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(218, 172, 113, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px -5px rgba(218, 172, 113, 0.3);
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(218, 172, 113, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* Success/Logout View */
        #logout-view p {
            font-size: 16px;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .logout-btn {
            background: #ff5555;
            box-shadow: 0 10px 20px -5px rgba(255, 85, 85, 0.3);
        }
        .logout-btn:hover {
            background: #ff4444;
            box-shadow: 0 15px 30px -5px rgba(255, 85, 85, 0.4);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                border: none;
                background: transparent;
                box-shadow: none;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-glow"></div>

    <div class="login-card">
        <div id="login-view">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
                <span>ADMIN</span>
            </div>
            <div class="login-title">관리자 인증이 필요합니다.</div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="admin@example.com" spellcheck="false">
            </div>
            
            <div class="form-group">
                <label for="password">Security Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••">
            </div>
            
            <button id="btn-login" class="btn-login">SIGN IN</button>
        </div>

        <div id="logout-view" style="display: none; text-align: center;">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
                <span>AUTH OK</span>
            </div>
            <p style="margin-bottom: 24px; color: var(--text-muted);">이미 관리자로 인증되었습니다.</p>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button id="btn-go-dashboard" class="btn-login">대시보드 이동</button>
                <button id="btn-logout" class="btn-login" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #ff5555;">로그아웃</button>
            </div>
        </div>

        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            지도로 돌아가기
        </a>
    </div>

    <script type="module" src="js/admin-login.js"></script>
</body>
</html>
